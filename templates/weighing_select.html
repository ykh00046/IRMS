<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IRMS · Weighing Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/css/common.css" />
    <link rel="stylesheet" href="/static/css/access.css" />
  </head>
  <body>
    <main class="access-shell">
      <section class="access-stage access-stage-split">
        <div class="access-hero">
          <p class="eyebrow">Weighing Flow</p>
          <h1>OPERATOR SIGN-IN</h1>
          <p class="access-subtitle">
            담당자를 선택하고 비밀번호(사번)를 입력하면 계량 화면으로 이동합니다.
          </p>
        </div>

        <form id="operator-login-form" class="access-form">
          <input id="next-url" type="hidden" value="{{ next_url }}" />

          <label class="filter-label" for="operator-username">담당자</label>
          <select id="operator-username" class="select">
            {% for operator in operators %}
            <option value="{{ operator.username }}">{{ operator.display_name }} (@{{ operator.username }})</option>
            {% endfor %}
          </select>
          {% if not operators %}
          <p class="login-error">
            활성화된 담당자 계정이 없습니다. 사용자 계정 등록 후 로그인하세요.
          </p>
          {% endif %}

          <label class="filter-label" for="operator-password">비밀번호</label>
          <input
            id="operator-password"
            type="password"
            class="input"
            autocomplete="current-password"
            placeholder="사번을 입력하세요"
          />

          <p id="operator-login-error" class="login-error" hidden></p>

          <div class="access-actions">
            <a href="/" class="btn">처음으로</a>
            <button id="operator-login-submit" type="submit" class="btn accent">계량 시작</button>
          </div>
        </form>
      </section>
    </main>

    <div id="toast-root" class="toast-container" role="status" aria-live="polite"></div>
    <script src="/static/js/common.js"></script>
    <script src="/static/js/weighing_select.js"></script>
  </body>
</html>
