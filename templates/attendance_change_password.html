<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IRMS · 비밀번호 변경</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/css/common.css" />
    <link rel="stylesheet" href="/static/css/access.css" />
  </head>
  <body>
    <main class="access-shell">
      <section class="access-stage access-stage-split">
        <div class="access-hero">
          <p class="eyebrow">Password Change</p>
          <h1>비밀번호 변경</h1>
          <p class="access-subtitle">
            사번 <strong>{{ emp_id }}</strong> 님, 관리자에게 발급받은 임시 비밀번호를 사용 중입니다.
            안전한 새 비밀번호로 변경한 뒤 근태를 확인해주세요.
          </p>
        </div>

        <form id="att-change-form" class="access-form" autocomplete="off">
          <label class="filter-label" for="att-current-password">현재 비밀번호</label>
          <input
            id="att-current-password"
            type="password"
            class="input"
            autocomplete="current-password"
            required
          />

          <label class="filter-label" for="att-new-password">새 비밀번호 (4자 이상, 사번과 다르게)</label>
          <input
            id="att-new-password"
            type="password"
            class="input"
            autocomplete="new-password"
            required
            minlength="4"
          />

          <label class="filter-label" for="att-new-password-confirm">새 비밀번호 확인</label>
          <input
            id="att-new-password-confirm"
            type="password"
            class="input"
            autocomplete="new-password"
            required
            minlength="4"
          />

          <p id="att-change-error" class="login-error" hidden></p>

          <div class="access-actions">
            <button id="att-change-logout" type="button" class="btn">로그아웃</button>
            <button id="att-change-later" type="button" class="btn">나중에 변경</button>
            <button type="submit" class="btn accent">변경하기</button>
          </div>
        </form>
      </section>
    </main>

    <div id="toast-root" class="toast-container" role="status" aria-live="polite"></div>
    <!-- IRMS common modules: load order matters (core -> mappers/format -> APIs -> ui/audio -> polling -> bootstrap) -->
    <script src="/static/js/common/core.js"></script>
    <script src="/static/js/common/mappers.js"></script>
    <script src="/static/js/common/format.js"></script>
    <script src="/static/js/common/api-users.js"></script>
    <script src="/static/js/common/api-recipes.js"></script>
    <script src="/static/js/common/api-stock.js"></script>
    <script src="/static/js/common/api-spreadsheet.js"></script>
    <script src="/static/js/common/api-stats.js"></script>
    <script src="/static/js/common/ui.js"></script>
    <script src="/static/js/common/audio.js"></script>
    <script src="/static/js/common/polling.js"></script>
    <script src="/static/js/common.js"></script>
    <script src="/static/js/attendance_change_password.js"></script>
    <script src="/static/js/attendance_session.js?v=20260430-1"></script>
  </body>
</html>
