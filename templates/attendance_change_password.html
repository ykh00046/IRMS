<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BRM · 비밀번호 변경</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/css/common.css?v=20260703a" />
    <link rel="stylesheet" href="/static/css/access.css?v=20260702a" />
  </head>
  <body class="launch-body">
    <main class="login-stage">
      <form id="att-change-form" class="login-card" autocomplete="off">
        <div class="login-head">
          <span class="brand-logo login-logo">IR</span>
          <h1 class="login-title">비밀번호 변경</h1>
          <p class="login-subtitle">사번 {{ emp_id }} · 임시 비밀번호를 새 비밀번호로 변경하세요</p>
        </div>

        <div class="login-field">
          <label class="filter-label" for="att-current-password">현재 비밀번호</label>
          <input
            id="att-current-password"
            type="password"
            class="input"
            autocomplete="current-password"
            required
          />
        </div>

        <div class="login-field">
          <label class="filter-label" for="att-new-password">새 비밀번호 (4자 이상, 사번과 다르게)</label>
          <input
            id="att-new-password"
            type="password"
            class="input"
            autocomplete="new-password"
            required
            minlength="4"
          />
        </div>

        <div class="login-field">
          <label class="filter-label" for="att-new-password-confirm">새 비밀번호 확인</label>
          <input
            id="att-new-password-confirm"
            type="password"
            class="input"
            autocomplete="new-password"
            required
            minlength="4"
          />
        </div>

        <p id="att-change-error" class="login-error" hidden></p>

        <button type="submit" class="btn accent login-submit">변경하기</button>

        <div class="login-actions-row">
          <button id="att-change-later" type="button" class="btn compact">나중에 변경</button>
          <button id="att-change-logout" type="button" class="btn compact">로그아웃</button>
        </div>
      </form>
    </main>

    <div id="toast-root" class="toast-container" role="status" aria-live="polite"></div>
    <!-- IRMS common modules: load order matters (core -> mappers/format -> APIs -> ui/audio -> polling -> bootstrap) -->
    <script src="/static/js/common/core.js?v=20260624a"></script>
    <script src="/static/js/common/mappers.js?v=20260707b"></script>
    <script src="/static/js/common/format.js?v=20260703a"></script>
    <script src="/static/js/common/api-users.js?v=20260707b"></script>
    <script src="/static/js/common/api-recipes.js?v=20260707a"></script>
    <script src="/static/js/common/api-materials.js?v=20260707b"></script>
    <script src="/static/js/common/ui.js?v=20260624a"></script>
    <script src="/static/js/common/audio.js?v=20260707b"></script>
    <script src="/static/js/common.js?v=20260703a"></script>
    <script src="/static/js/attendance_change_password.js?v=20260624a"></script>
    <script src="/static/js/attendance_session.js?v=20260624a"></script>
  </body>
</html>
