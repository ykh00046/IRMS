<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IRMS · 비밀번호 변경</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/css/common.css" />
    <link rel="stylesheet" href="/static/css/access.css" />
    <link rel="stylesheet" href="/static/css/attendance.css" />
  </head>
  <body>
    <main class="access-shell">
      <section class="access-stage access-stage-split">
        <div class="access-hero">
          <p class="eyebrow">Security</p>
          <h1>비밀번호 변경</h1>
          <p class="access-subtitle">
            사번 {{ emp_id }}님, 초기 비밀번호(사번과 동일)를 사용 중입니다.
            안전한 새 비밀번호로 변경한 뒤 근태를 확인해주세요.
          </p>
        </div>

        <form id="att-change-form" class="access-form" autocomplete="off">
          <label class="field">
            <span class="field-label">현재 비밀번호</span>
            <input id="att-current-password" type="password" required autocomplete="current-password" />
          </label>
          <label class="field">
            <span class="field-label">새 비밀번호 (4자 이상, 사번과 다르게)</span>
            <input id="att-new-password" type="password" required minlength="4" autocomplete="new-password" />
          </label>
          <label class="field">
            <span class="field-label">새 비밀번호 확인</span>
            <input id="att-new-password-confirm" type="password" required minlength="4" autocomplete="new-password" />
          </label>
          <div class="access-actions">
            <button type="submit" class="btn accent">변경하기</button>
            <button id="att-change-logout" type="button" class="btn compact">로그아웃</button>
            <span id="att-change-hint" class="field-hint" role="status" aria-live="polite"></span>
          </div>
        </form>
      </section>
    </main>

    <div id="toast-root" class="toast-container" role="status" aria-live="polite"></div>
    <script src="/static/js/common.js"></script>
    <script src="/static/js/attendance_change_password.js"></script>
  </body>
</html>
