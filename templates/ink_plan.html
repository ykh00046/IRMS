<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IRMS · 생산계획</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/css/common.css" />
    <link rel="stylesheet" href="/static/css/ink_plan.css" />
  </head>
  <body class="ink-plan-page">
    <header class="ink-plan-header">
      <div class="ink-plan-header-left">
        <a href="/" class="btn compact">처음</a>
        <h1>생산계획</h1>
      </div>
      <div class="ink-plan-header-right">
        <span class="ink-plan-badge">INK 요청서 자동 완성</span>
      </div>
    </header>

    <main class="ink-plan-shell">
      <!-- Upload Section -->
      <section class="ink-plan-panel ink-plan-upload">
        <h3 class="ink-plan-panel-title">📷 INK 요청서 이미지 업로드</h3>
        <div id="drop-zone" class="pp-drop-zone">
          <div class="pp-drop-icon">📋</div>
          <p class="pp-drop-text">INK 요청서 스크린샷을 드래그하거나 클릭하세요</p>
          <p class="pp-drop-sub">또는 <kbd>Ctrl+V</kbd>로 클립보드에서 붙여넣기</p>
          <input id="file-input" type="file" accept="image/*" hidden />
        </div>
        <div id="upload-preview" class="pp-preview" hidden>
          <img id="preview-img" alt="미리보기" />
          <div class="pp-preview-actions">
            <button id="btn-analyze" class="btn accent" type="button">🔍 분석 시작</button>
            <button id="btn-clear" class="btn" type="button">취소</button>
          </div>
        </div>
        <div id="upload-progress" class="pp-progress" hidden>
          <div class="pp-spinner"></div>
          <span>Gemini AI로 분석 중...</span>
        </div>
      </section>

      <!-- Match Results Section -->
      <section id="match-section" class="ink-plan-panel ink-plan-match" hidden>
        <div class="ink-plan-match-header">
          <h3 class="ink-plan-panel-title">📋 매칭 결과</h3>
          <div id="match-summary" class="pp-match-summary"></div>
        </div>

        <div id="match-tabs" class="pp-tabs"></div>

        <div class="ink-plan-table-wrap">
          <table id="match-table">
            <thead>
              <tr>
                <th>호기</th>
                <th>구분</th>
                <th>OCR 결과</th>
                <th>매칭 제품</th>
                <th>상태</th>
              </tr>
            </thead>
            <tbody id="match-body"></tbody>
          </table>
        </div>

        <div class="pp-confirm-bar">
          <button id="btn-confirm" class="btn accent" type="button">✅ 전체 확정</button>
          <span id="confirm-stats" class="muted"></span>
        </div>
      </section>

      <!-- Chemical Requests Section -->
      <section id="chemical-section" class="ink-plan-panel ink-plan-chemical" hidden>
        <h3 class="ink-plan-panel-title">💊 약품 요청서</h3>
        <div class="ink-plan-table-wrap">
          <table>
            <thead>
              <tr>
                <th>약품명</th>
                <th>농도</th>
                <th class="num">3F 대수</th>
                <th class="num">1F 대수</th>
              </tr>
            </thead>
            <tbody id="chemical-body"></tbody>
          </table>
        </div>
      </section>

      <!-- Weekly Board (after confirm) -->
      <section id="board-section" class="ink-plan-panel ink-plan-board" hidden>
        <div class="ink-plan-match-header">
          <h3 class="ink-plan-panel-title">📊 주간 생산 보드</h3>
          <button id="btn-back-upload" class="btn compact" type="button">← 새 분석</button>
        </div>
        <div id="board-tabs" class="pp-tabs"></div>
        <div id="board-grid" class="board-grid"></div>
      </section>

      <!-- Saved Plans Section -->
      <section class="ink-plan-panel ink-plan-history">
        <h3 class="ink-plan-panel-title">📅 저장된 생산계획</h3>
        <div id="plans-empty" class="pp-empty">
          <p>저장된 계획을 불러오는 중...</p>
        </div>
        <div class="ink-plan-table-wrap">
          <table id="plans-table" hidden>
            <thead>
              <tr>
                <th>계획명</th>
                <th>기간</th>
                <th>상태</th>
                <th>생성일</th>
                <th>액션</th>
              </tr>
            </thead>
            <tbody id="plans-body"></tbody>
          </table>
        </div>
      </section>
    </main>

    <!-- Plan Detail Overlay -->
    <div id="plan-detail-overlay" class="plan-overlay" hidden>
      <div class="plan-overlay-content">
        <div class="plan-overlay-header">
          <h2 id="plan-detail-title">계획 상세</h2>
          <button id="btn-close-detail" class="btn compact" type="button">✕ 닫기</button>
        </div>
        <div id="plan-detail-tabs" class="pp-tabs"></div>
        <div id="plan-detail-board" class="board-grid"></div>
        <div id="plan-detail-chemicals" class="ink-plan-table-wrap" hidden>
          <h4>💊 약품 요청서</h4>
          <table>
            <thead>
              <tr><th>약품명</th><th>농도</th><th class="num">3F</th><th class="num">1F</th></tr>
            </thead>
            <tbody id="plan-detail-chem-body"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="toast-root" class="toast-container" role="status" aria-live="polite"></div>
    <script src="/static/js/common.js"></script>
    <script src="/static/js/ink_plan.js"></script>
  </body>
</html>
