<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IRMS · Management Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/css/common.css" />
    <link rel="stylesheet" href="/static/css/access.css" />
  </head>
  <body>
    <main class="access-shell">
      <section class="access-stage access-stage-split">
        <div class="access-hero">
          <p class="eyebrow">Management Gate</p>
          <h1>MANAGER SIGN-IN</h1>
          <p class="access-subtitle">
            매니저를 선택하고 비밀번호를 입력하면 기존 관리 화면과 인사이트 화면으로 진입합니다.
          </p>

          {% if show_demo_credentials %}
          <div class="login-note">
            <strong>기본 계정</strong>
            <code>manager / manager123</code>
            <code>manager2 / manager223</code>
            <code>admin / admin123</code>
          </div>
          {% endif %}
        </div>

        <form id="management-login-form" class="access-form">
          <input id="next-url" type="hidden" value="{{ next_url }}" />

          <label class="filter-label" for="manager-username">매니저</label>
          <select id="manager-username" class="select">
            {% for manager in managers %}
            <option value="{{ manager.username }}">{{ manager.display_name }} (@{{ manager.username }})</option>
            {% endfor %}
          </select>
          {% if not managers %}
          <p class="login-error">
            활성화된 관리자 계정이 없습니다. 운영 환경에서는 별도 사용자 프로비저닝 후 로그인하세요.
          </p>
          {% endif %}

          <label class="filter-label" for="manager-password">비밀번호</label>
          <input
            id="manager-password"
            type="password"
            class="input"
            autocomplete="current-password"
            placeholder="비밀번호를 입력하세요"
          />

          <p id="management-login-error" class="login-error" hidden></p>

          <div class="access-actions">
            <a href="/" class="btn">처음으로</a>
            <button id="management-login-submit" type="submit" class="btn accent">관리 시작</button>
          </div>
        </form>
      </section>
    </main>

    <div id="toast-root" class="toast-container"></div>
    <script src="/static/js/common.js"></script>
    <script src="/static/js/management_login.js"></script>
  </body>
</html>
