<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BRM · 관리자 로그인</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/css/common.css?v=20260624a" />
    <link rel="stylesheet" href="/static/css/access.css?v=20260624a" />
  </head>
  <body class="launch-body">
    <main class="login-stage">
      <form id="management-login-form" class="login-card">
        <input id="next-url" type="hidden" value="{{ next_url }}" />

        <div class="login-head">
          <span class="brand-logo login-logo">IR</span>
          <h1 class="login-title">관리자 로그인</h1>
          <p class="login-subtitle">반제품 제조 관리 시스템</p>
        </div>

        <div class="login-field">
          <label class="filter-label" for="manager-username">아이디</label>
          <input
            id="manager-username"
            type="text"
            class="input"
            autocomplete="username"
            placeholder="admin"
            value="admin"
          />
        </div>

        <div class="login-field">
          <label class="filter-label" for="manager-password">비밀번호</label>
          <input
            id="manager-password"
            type="password"
            class="input"
            autocomplete="current-password"
            placeholder="비밀번호를 입력하세요"
          />
        </div>

        <p id="management-login-error" class="login-error" hidden></p>

        <button id="management-login-submit" type="submit" class="btn accent login-submit">로그인</button>

        {% if show_demo_credentials %}
        <p class="login-demo">기본 계정 <code>admin / admin</code> · 로그인 후 비밀번호를 변경하세요</p>
        {% endif %}

        <a href="/" class="login-back">← 처음으로</a>
      </form>
    </main>

    <div id="toast-root" class="toast-container" role="status" aria-live="polite"></div>
    <!-- IRMS common modules: load order matters (core -> mappers/format -> APIs -> ui/audio -> polling -> bootstrap) -->
    <script src="/static/js/common/core.js?v=20260624a"></script>
    <script src="/static/js/common/mappers.js?v=20260624a"></script>
    <script src="/static/js/common/format.js?v=20260624a"></script>
    <script src="/static/js/common/api-users.js?v=20260624a"></script>
    <script src="/static/js/common/api-recipes.js?v=20260626a"></script>
    <script src="/static/js/common/api-materials-weighing.js?v=20260624a"></script>
    <script src="/static/js/common/api-spreadsheet.js?v=20260624a"></script>
    <script src="/static/js/common/api-stats.js?v=20260624a"></script>
    <script src="/static/js/common/ui.js?v=20260624a"></script>
    <script src="/static/js/common/audio.js?v=20260624a"></script>
    <script src="/static/js/common.js?v=20260624a"></script>
    <script src="/static/js/management_login.js?v=20260624a"></script>
  </body>
</html>
