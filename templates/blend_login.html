<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BRM · 반제품 작업자</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/css/common.css?v=20260703a" />
    <link rel="stylesheet" href="/static/css/access.css?v=20260717a" />
  </head>
  <body class="launch-body">
    <main class="login-stage">
      <form id="blend-login-form" class="login-card" autocomplete="off" data-next-url="{{ next_url }}">
        <div class="login-head">
          <span class="brand-logo login-logo">BR</span>
          <h1 class="login-title">반제품 작업자</h1>
          <p class="login-subtitle">작업자 이름을 입력하면 배합 화면으로 이동합니다</p>
          <!-- 이름 입력이 자동 포커스되며 제안 목록이 펼쳐지므로, 책임자 진입 링크는
               목록에 가려지지 않게 입력 위(헤더 아래)에 둔다 -->
          <a href="/management/login" class="login-back">책임자 · 관리자 로그인 →</a>
        </div>

        <div class="login-field worker-suggest-anchor">
          <label class="filter-label" for="blend-login-worker">작업자</label>
          <!-- 파트 선택 — 레시피 분류처럼 드롭다운으로 파트를 먼저 고르고 이름을 고른다.
               '전체' 없음: 파트를 골라야 목록이 뜬다(이름 타이핑 검색은 전체에서 동작).
               파트 미지정 작업자는 '미지정'에서 보인다(도입기 하위호환). -->
          <div class="worker-part-filter">
            <select class="input" id="blend-login-part">
              <option value="">파트 선택…</option>
              <option value="약품">약품</option>
              <option value="합성">합성</option>
              <option value="잉크">잉크</option>
              <option value="용수">용수</option>
              <option value="__none__">미지정</option>
            </select>
          </div>
          <input
            id="blend-login-worker"
            name="worker"
            type="text"
            class="input"
            autocomplete="off"
            required
            minlength="1"
            maxlength="100"
            placeholder="이름 입력 또는 목록에서 선택"
          />
          <!-- 작업자 명단이 길어 datalist(브라우저 팝업, 높이 제어 불가) 대신
               높이 제한 + 스크롤되는 자체 제안 목록 사용 -->
          <div id="blend-login-suggest" class="worker-suggest" hidden></div>
        </div>

        <p id="blend-login-error" class="login-error" hidden></p>

        <button id="blend-login-submit" type="submit" class="btn accent login-submit">시작</button>
        <p class="login-demo">작업자 세션은 유휴 상태가 지속되면 자동 로그아웃됩니다</p>
        <a href="/" class="login-back">← 처음으로</a>
      </form>
    </main>

    <div id="toast-root" class="toast-container" role="status" aria-live="polite"></div>
    <script src="/static/js/common/core.js?v=20260624a"></script>
    <script src="/static/js/blend_login.js?v=20260717a"></script>
  </body>
</html>
