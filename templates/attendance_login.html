<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IRMS · 근태 로그인</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/css/common.css" />
    <link rel="stylesheet" href="/static/css/access.css" />
  </head>
  <body>
    <main class="access-shell">
      <section class="access-stage access-stage-split">
        <div class="access-hero">
          <p class="eyebrow">Attendance Gate</p>
          <h1>ATTENDANCE SIGN-IN</h1>
          <p class="access-subtitle">
            사번을 입력해 이번 달 출퇴근과 연장 시간을 확인합니다.
            최초 로그인용 임시 비밀번호는 관리자에게 발급받으세요. 로그인 후 변경이 필요합니다.
          </p>
        </div>

        <form id="att-login-form" class="access-form" autocomplete="off">
          <label class="filter-label" for="att-emp-id">사번</label>
          <input
            id="att-emp-id"
            name="emp_id"
            type="text"
            class="input"
            inputmode="numeric"
            autocomplete="username"
            required
            minlength="1"
            maxlength="20"
            placeholder="예) 171013"
          />

          <label class="filter-label" for="att-password">비밀번호</label>
          <input
            id="att-password"
            name="password"
            type="password"
            class="input"
            autocomplete="current-password"
            required
            placeholder="초기값은 사번과 동일"
          />

          <p id="att-login-error" class="login-error" hidden></p>

          <div class="access-actions">
            <a href="/" class="btn">처음으로</a>
            <button id="att-login-submit" type="submit" class="btn accent">로그인</button>
          </div>
        </form>
      </section>
    </main>

    <div id="toast-root" class="toast-container" role="status" aria-live="polite"></div>
    <!-- IRMS common modules: load order matters (core -> mappers/format -> APIs -> ui/audio -> polling -> bootstrap) -->
    <script src="/static/js/common/core.js"></script>
    <script src="/static/js/common/mappers.js"></script>
    <script src="/static/js/common/format.js"></script>
    <script src="/static/js/common/api-users.js"></script>
    <script src="/static/js/common/api-recipes.js"></script>
    <script src="/static/js/common/api-stock.js"></script>
    <script src="/static/js/common/api-chat.js"></script>
    <script src="/static/js/common/api-spreadsheet.js"></script>
    <script src="/static/js/common/api-stats.js"></script>
    <script src="/static/js/common/ui.js"></script>
    <script src="/static/js/common/audio.js"></script>
    <script src="/static/js/common/polling.js"></script>
    <script src="/static/js/common.js"></script>
    <script src="/static/js/attendance_login.js"></script>
  </body>
</html>
