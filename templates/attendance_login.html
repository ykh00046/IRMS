<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BRM · 근태 로그인</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/css/common.css?v=20260703a" />
    <link rel="stylesheet" href="/static/css/access.css?v=20260702a" />
  </head>
  <body class="launch-body">
    <main class="login-stage">
      <form id="att-login-form" class="login-card" autocomplete="off">
        <div class="login-head">
          <span class="brand-logo login-logo">IR</span>
          <h1 class="login-title">근태 확인</h1>
          <p class="login-subtitle">사번으로 로그인해 월별 근태를 조회합니다</p>
          <!-- 책임자는 사번 없이 책임자 모드로 근태를 볼 수 있다 — blend_login 의 진입
               링크와 동일 패턴. 로그인 후 next 로 근태 화면 복귀(/attendance 는 admin_mode 허용). -->
          <a href="/management/login?next=/attendance" class="login-back">책임자 · 관리자 로그인 →</a>
        </div>

        <div class="login-field">
          <label class="filter-label" for="att-emp-id">사번</label>
          <input
            id="att-emp-id"
            name="emp_id"
            type="text"
            class="input"
            inputmode="numeric"
            autocomplete="username"
            required
            minlength="1"
            maxlength="20"
            placeholder="예) 171013"
          />
        </div>

        <div class="login-field">
          <label class="filter-label" for="att-password">비밀번호</label>
          <input
            id="att-password"
            name="password"
            type="password"
            class="input"
            autocomplete="current-password"
            required
            placeholder="임시 비밀번호는 책임자에게 발급받으세요"
          />
        </div>

        <p id="att-login-error" class="login-error" hidden></p>

        <button id="att-login-submit" type="submit" class="btn accent login-submit">로그인</button>

        <p class="login-demo">최초 임시 비밀번호는 책임자에게 발급받으세요 · 로그인 후 변경 필요</p>

        <a href="/" class="login-back">← 처음으로</a>
      </form>
    </main>

    <div id="toast-root" class="toast-container" role="status" aria-live="polite"></div>
    <!-- IRMS common modules: load order matters (core -> mappers/format -> APIs -> ui/audio -> polling -> bootstrap) -->
    <script src="/static/js/common/core.js?v=20260624a"></script>
    <script src="/static/js/common/mappers.js?v=20260707b"></script>
    <script src="/static/js/common/format.js?v=20260703a"></script>
    <script src="/static/js/common/api-users.js?v=20260707b"></script>
    <script src="/static/js/common/api-recipes.js?v=20260708a"></script>
    <script src="/static/js/common/api-materials.js?v=20260707b"></script>
    <script src="/static/js/common/ui.js?v=20260624a"></script>
    <script src="/static/js/common/audio.js?v=20260707b"></script>
    <script src="/static/js/common.js?v=20260703a"></script>
    <script src="/static/js/attendance_login.js?v=20260624a"></script>
  </body>
</html>
