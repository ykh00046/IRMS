<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IRMS · Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/css/common.css" />
    <link rel="stylesheet" href="/static/css/login.css" />
  </head>
  <body>
    <main class="login-shell">
      <section class="login-panel">
        <div class="login-copy">
          <p class="eyebrow">IRMS Access Gate</p>
          <h1>INK RECIPE ACCESS</h1>
          <p class="login-subtitle">
            사내 IRMS 접근을 위해 아이디와 비밀번호로 로그인합니다.
          </p>

          <div class="login-note">
            <strong>기본 계정</strong>
            <code>admin / admin123</code>
            <code>operator / operator123</code>
          </div>
        </div>

        <form id="login-form" class="login-form">
          <input id="next-url" type="hidden" value="{{ next_url }}" />

          <label class="filter-label" for="username">아이디</label>
          <input id="username" name="username" class="input" autocomplete="username" placeholder="아이디를 입력하세요" />

          <label class="filter-label" for="password">비밀번호</label>
          <input
            id="password"
            name="password"
            type="password"
            class="input"
            autocomplete="current-password"
            placeholder="비밀번호를 입력하세요"
          />

          <p id="login-error" class="login-error" hidden></p>

          <button id="login-submit" type="submit" class="btn accent login-submit">로그인</button>
        </form>
      </section>
    </main>

    <div id="toast-root" class="toast-container"></div>
    <script src="/static/js/common.js"></script>
    <script src="/static/js/login.js"></script>
  </body>
</html>
