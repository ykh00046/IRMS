<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BRM · 통합 제조 · 근태 관리</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/css/common.css?v=20260624a" />
    <link rel="stylesheet" href="/static/css/access.css?v=20260624a" />
  </head>
  <body class="launch-body">
    <a href="/test" class="entry-test-corner" title="테스트 화면 (계량·관리)">test</a>

    <main class="launch-stage">
      <header class="launch-head">
        <span class="brand-logo launch-logo">IR</span>
        <h1 class="launch-title">BRM</h1>
        <p class="launch-sub">통합 제조 · 근태 관리 시스템</p>
        <p class="launch-date" id="launch-date"></p>
      </header>

      <div class="launch-grid">
        <a href="/attendance" class="launch-tile">
          <span class="launch-tile-ico launch-tile-ico-att" aria-hidden="true">🗓</span>
          <span class="launch-tile-title">근태 확인</span>
          <span class="launch-tile-desc">출퇴근 · 근무시간 · 지각 · 연차 등<br />월별 근태 현황을 조회합니다</span>
          <span class="launch-tile-go">바로가기 <span aria-hidden="true">→</span></span>
        </a>
        <a href="/blend" class="launch-tile launch-tile-accent">
          <span class="launch-tile-ico launch-tile-ico-mfg" aria-hidden="true">◎</span>
          <span class="launch-tile-title">반제품 제조 관리</span>
          <span class="launch-tile-desc">배합 · 점도 · 레시피 · DHR 등<br />반제품 제조 전반을 관리합니다</span>
          <span class="launch-tile-go launch-tile-go-accent">바로가기 <span aria-hidden="true">→</span></span>
        </a>
      </div>

      <footer class="launch-foot">
        {% if current_user %}
        <span>{{ current_user.display_name }} · {{ current_user.role_label }} · @{{ current_user.username }}</span>
        <button id="logout-btn" type="button" class="btn compact launch-logout">로그아웃</button>
        {% else %}
        <a href="/management/login" class="launch-foot-link">관리자 로그인</a>
        {% endif %}
      </footer>
    </main>

    <div id="toast-root" class="toast-container" role="status" aria-live="polite"></div>
    <script>
      (function () {
        var el = document.getElementById("launch-date");
        if (el) {
          el.textContent = new Date().toLocaleDateString("ko-KR", {
            year: "numeric",
            month: "long",
            day: "numeric",
            weekday: "long",
          });
        }
      })();
    </script>
    <!-- IRMS common modules: load order matters (core -> mappers/format -> APIs -> ui/audio -> polling -> bootstrap) -->
    <script src="/static/js/common/core.js?v=20260624a"></script>
    <script src="/static/js/common/mappers.js?v=20260624a"></script>
    <script src="/static/js/common/format.js?v=20260624a"></script>
    <script src="/static/js/common/api-users.js?v=20260624a"></script>
    <script src="/static/js/common/api-recipes.js?v=20260626a"></script>
    <script src="/static/js/common/api-materials-weighing.js?v=20260624a"></script>
    <script src="/static/js/common/api-spreadsheet.js?v=20260624a"></script>
    <script src="/static/js/common/api-stats.js?v=20260624a"></script>
    <script src="/static/js/common/ui.js?v=20260624a"></script>
    <script src="/static/js/common/audio.js?v=20260624a"></script>
    <script src="/static/js/common.js?v=20260624a"></script>
  </body>
</html>
